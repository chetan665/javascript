<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f7fb;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 450px;
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #222;
      }

      .input-box {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        font-size: 16px;
        outline: none;
      }

      input:focus {
        border-color: #4f46e5;
      }

      .add-btn {
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        font-size: 15px;
      }

      .add-btn:hover {
        opacity: 0.9;
      }

      ul {
        list-style: none;
        margin-top: 25px;
      }

      li {
        background: #f7f7f7;
        margin-top: 12px;
        padding: 12px 15px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      li span {
        cursor: pointer;
        font-size: 16px;
        color: #222;
      }

      .delete-btn {
        background: crimson;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
      }

      .delete-btn:hover {
        opacity: 0.9;
      }

      .completed {
        text-decoration: line-through;
        opacity: 0.6;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>My Todo App</h1>

      <div class="input-box">
        <input id="itemInput" type="text" placeholder="Enter your task" />
        <button id="addBtn" class="add-btn">Add</button>
      </div>

      <ul id="list"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
